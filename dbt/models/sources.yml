  # ============================================================
  # MDP 360i Sources — added to replace var() table references
  # in models/bronze/ and models/silver/ and models/gold/
  # ============================================================

  - name: MDF_ETL
    database: BSM_ETL
    schema: MDF
    description: "BSM_ETL.MDF — raw SFTP-ingested staging tables for the MDP 360i pipeline"
    tables:
      - name: MDP_ACTIVITY_QUESTIONS
        description: >
          Activity question responses (SFTP file: ActivityQuestions_date.csv).
          Replaces: var('MDF.MDP_ACTIVITY_QUESTIONS') = BSM_ETL.MDF.MDP_ACTIVITY_QUESTIONS
      - name: MDP_PLANCLAIMHEADER
        description: >
          Plan and claim header rows (SFTP file: PlanClaimHeader_date.csv).
          Replaces: var('MDF.MDP_PLANCLAIMHEADER') = BSM_ETL.MDF.MDP_PLANCLAIMHEADER
      - name: MDP_CAMPAIGNS
        description: >
          Campaign rows (SFTP file: Campaigns_date.csv).
          Replaces: var('MDF.MDP_CAMPAIGNS') = BSM_ETL.MDF.MDP_CAMPAIGNS

  - name: MDF_RAW
    database: RAW
    schema: MDF
    description: "RAW.MDF — activity type reference / lookup data"
    tables:
      - name: MDP_ACTIVITY_TYPE
        description: >
          Activity type mapping table used for renaming ACTIVITY_TYPE in the gold layer.
          Replaces: var('MDF.MDP_ACTIVITY_TYPE') = RAW.MDF.MDP_ACTIVITY_TYPE

  - name: MDF_LOOKUPS
    database: RAW
    schema: MDF_LOOKUPS
    description: "RAW.MDF_LOOKUPS — partner, budget, and GTM reference data for MDP models"
    tables:
      - name: GTM_TIERS
        description: >
          Country-to-GTM-tier mapping (A/B/C/D).
          Replaces: var('MDF_LOOKUPS.GTM_TIERS') = RAW.MDF_LOOKUPS.GTM_TIERS
      - name: GLOBAL_MDF_BUDGET
        description: >
          Historical global MDF budget data (used for pre-FY21Q2 budget rows).
          Replaces: var('MDF_LOOKUPS.GLOBAL_MDF_BUDGET') = RAW.MDF_LOOKUPS.GLOBAL_MDF_BUDGET
      - name: GLOBAL_MDF_BUDGET_CURRENT
        description: >
          Current global MDF budget data.
          Replaces: var('MDF_LOOKUPS.GLOBAL_MDF_BUDGET_CURRENT') = RAW.MDF_LOOKUPS.GLOBAL_MDF_BUDGET_CURRENT
      - name: MDP_CMM_PARTNER_LIST
        description: >
          Named CMM partner list used for PMM assignment and focus partner flag.
          Replaces: var('MDF_LOOKUPS.MDP_CMM_PARTNER_LIST') = RAW.MDF_LOOKUPS.MDP_CMM_PARTNER_LIST

  - name: QV_LEGACY
    database: RAW
    schema: QV_LEGACY
    description: "RAW.QV_LEGACY — historical QlikView legacy spend data"
    tables:
      - name: CCI_REPORT
        description: >
          Legacy CCI (Channel Campaign Intelligence) report from QlikView.
          Replaces: var('QV_LEGACY.CCI_REPORT') = RAW.QV_LEGACY.CCI_REPORT
      - name: MDF_ROI_ROLL_UP
        description: >
          Legacy MDF ROI roll-up report from QlikView.
          Replaces: var('QV_LEGACY.MDF_ROI_ROLL_UP') = RAW.QV_LEGACY.MDF_ROI_ROLL_UP

  - name: JMP_MDF_SFTP
    database: RAW
    schema: JMP_MDF_SFTP
    description: "RAW.JMP_MDF_SFTP — MDP SFTP-ingested partner reference files"
    tables:
